repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        types_or: [c++, c, cuda]

  - repo: local
    hooks:
      - id: cmake-format
        name: cmake-format
        entry: cmake-format -i
        language: python
        types_or: [cmake]
        additional_dependencies: [cmake-format]

      - id: commit-msg
        name: conventional commit check
        language: system
        stages: [commit-msg]
        entry: |
          bash -c 'if ! grep -qE "^(feat|fix|docs|style|refactor|test|chore|perf|ci)(\(.+\))?!?: .+" "$0"; then echo "Commit message must follow Conventional Commits"; exit 1; fi'
