name: CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        cxx: [g++, clang++]
        build_type: [Debug, Release]
        include:
          - cxx: g++
            cc: gcc
          - cxx: clang++
            cc: clang
          - cxx: clang++
            build_type: Debug
            asan: ON
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: '3.11' }
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y cppcheck clang-tidy
    - name: Install Python tools
      run: pip install conan pre-commit cmake-format
    - name: Setup Conan
      run: |
        conan profile detect --force
        conan install . -s build_type=${{ matrix.build_type }} -s compiler.cppstd=23 --output-folder=build --build=missing
    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCXXPROBE_ENABLE_ASAN=${{ matrix.asan || 'OFF' }} -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake
    - name: Build
      run: cmake --build build --parallel
    - name: Set up cgroup for sandbox tests
      run: |
        sudo mkdir -p /sys/fs/cgroup/cxxprobe
        sudo chown runner:runner /sys/fs/cgroup/cxxprobe
        sudo sh -c 'echo "+memory +cpu +pids" >> /sys/fs/cgroup/cgroup.subtree_control' || true
    - name: Run tests
      run: ctest --test-dir build --output-on-failure --timeout 60
    - name: Pre-commit checks
      run: pre-commit run --all-files
    - name: Cppcheck
      run: cmake --build build --target cppcheck
    - name: Clang-tidy (only clang)
      if: matrix.cxx == 'clang++'
      run: cmake --build build --target cxxprobe
